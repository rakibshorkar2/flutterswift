name: Build DirXplore Pro IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  APP_NAME: DirXplorePro

jobs:
  build-ipa:
    name: Build Unsigned IPA
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          $version = Select-String -Path pubspec.yaml -Pattern '^version: (.+)\+' | ForEach-Object { $_.Matches.Groups[1].Value }
          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "tag=v$version+${{ github.run_number }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 --build-number=${{ github.run_number }}
        env:
          SWIFT_STRICT_CONCURRENCY: minimal

      - name: Package IPA
        run: |
          mkdir -p /tmp/ipa_export/Payload
          cp -r build/ios/iphoneos/Runner.app /tmp/ipa_export/Payload/
          cd /tmp/ipa_export
          zip -r ${{ env.APP_NAME }}.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ github.run_number }}
          path: /tmp/ipa_export/${{ env.APP_NAME }}.ipa
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ env.APP_NAME }} ${{ steps.version.outputs.version }} (build ${{ github.run_number }})" \
            --notes "Automated build from commit ${{ github.sha }}" \
            /tmp/ipa_export/${{ env.APP_NAME }}.ipa
        env:
          GH_TOKEN: ${{ github.token }}
