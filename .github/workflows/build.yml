name: Build DirXplore Pro IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  APP_NAME: DirXplorePro

jobs:
  build-ipa:
    name: Build Unsigned IPA
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 --build-number=${{ github.run_number }}

      - name: Package IPA
        run: |
          mkdir -p /tmp/ipa_export/Payload
          cp -r build/ios/iphoneos/Runner.app /tmp/ipa_export/Payload/
          cd /tmp/ipa_export
          zip -r ${{ env.APP_NAME }}.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ github.run_number }}
          path: /tmp/ipa_export/${{ env.APP_NAME }}.ipa
          retention-days: 30
